name: Weekly AI Blog Post

on:
  schedule:
    # Every Monday at 9:00 AM Eastern (13:00 UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTMARK_API_TOKEN: ${{ secrets.POSTMARK_API_TOKEN }}
        run: |
          node generate-post.mjs

      - name: Commit and push new post
        run: |
          git config user.name "DOT Physical Blog Bot"
          git config user.email "blog-bot@dot-physical.net"
          git add .
          git diff --staged --quiet || git commit -m "Weekly blog post: $(date +'%Y-%m-%d')"
          git push
